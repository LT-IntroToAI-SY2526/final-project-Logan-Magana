<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: transparent; overflow: hidden; }

  #canvas-wrap {
    width: 100%; height: 420px; position: relative;
    background: radial-gradient(ellipse at 50% 30%, #e8e3f5 0%, #ddd8ec 40%, #cec9e0 100%);
    border-radius: 12px; overflow: hidden;
  }
  #c { display: block; width: 100%; height: 100%; }

  #info-bar {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.82); backdrop-filter: blur(8px);
    border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #444;
  }

  #style-btns {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 6px;
  }
  .style-btn {
    background: rgba(255,255,255,0.85); border: 1.5px solid #b9b2d4;
    border-radius: 8px; padding: 5px 11px; font-size: 11px; color: #5a3fa0;
    cursor: pointer; font-weight: 700; transition: all 0.15s;
  }
  .style-btn:hover, .style-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; }

  #bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,255,255,0.78); backdrop-filter: blur(8px);
    border-top: 1px solid rgba(180,170,210,0.3);
    font-size: 11px; color: #666;
  }
  #capture-btn {
    background: linear-gradient(135deg, #059669, #34d399);
    color: white; border: none; border-radius: 8px;
    padding: 7px 14px; font-size: 11px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em;
    box-shadow: 0 3px 10px #05966944; transition: opacity 0.15s;
  }
  #capture-btn:hover { opacity: 0.88; }
  #capture-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  #status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(124,58,237,0.92); color: white;
    padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 600;
    display: none; pointer-events: none; z-index: 10;
  }

  /* Thumbnail strip */
  #thumb-strip {
    position: absolute; bottom: 48px; left: 0; right: 0;
    display: none; gap: 6px; align-items: center; padding: 6px 10px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
    border-top: 1px solid #ddd; overflow-x: auto;
  }
  #thumb-strip.show { display: flex; }
  .thumb { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
  .thumb img { width: 46px; height: 46px; border-radius: 4px; border: 1.5px solid #a78bfa; image-rendering: pixelated; }
  .thumb span { font-size: 8px; color: #7c3aed; font-weight: 700; letter-spacing: 0.06em; }
  #thumb-label { font-size: 10px; font-weight: 700; color: #7c3aed; flex-shrink: 0; }
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="info-bar">Sprite: <span id="dim">?</span> · <span id="vcount">?</span> voxels</div>
  <div id="style-btns">
    <button class="style-btn" onclick="setStyle('cube')">■ Box</button>
    <button class="style-btn active" onclick="setStyle('round')">▣ Round</button>
    <button class="style-btn" onclick="setStyle('sphere')">● Sphere</button>
  </div>
  <div id="thumb-strip">
    <span id="thumb-label">CAPTURED →</span>
  </div>
  <div id="bottom-bar">
    <span>🖱 drag to rotate · scroll to zoom</span>
    <button id="capture-btn" onclick="captureAllFaces()">📷 Capture 6 Faces (ZIP download)</button>
  </div>
  <div id="status"></div>
</div>

<!-- Three.js UMD builds — no importmap needed, works in all iframes -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<!-- JSZip for bundling the 6 face PNGs into one download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ── Data injected by app.py via voxelizer.export_grid_json() ─────────────────
const GRID  = __GRID_DATA__;
const SPR_W = __SPRITE_W__;
const SPR_H = __SPRITE_H__;
const H = GRID.H, W = GRID.W, MAX_D = GRID.MAX_D;

// Build flat occupancy lookup (Uint8Array for O(1) neighbor checks).
var occArray = new Uint8Array(MAX_D * H * W);
var occIdx   = function(x, y, z) { return z * H * W + y * W + x; };
for (var gy = 0; gy < H; gy++) {
    for (var gx = 0; gx < W; gx++) {
        var d = GRID.depthMap[gy][gx];
        if (d === 0) continue;
        var zStart = Math.floor((MAX_D - d) / 2);
        for (var gz = zStart; gz < zStart + d; gz++) {
            occArray[occIdx(gx, gy, gz)] = 1;
        }
    }
}

// Surface-only voxels: only keep voxels with at least one empty neighbour.
// Removes all internal voxels, cutting GPU load by 60-80% on solid models.
var isOcc = function(x, y, z) {
    if (x < 0 || x >= W || y < 0 || y >= H || z < 0 || z >= MAX_D) return 0;
    return occArray[occIdx(x, y, z)];
};

var VOXELS = [];
for (var gy = 0; gy < H; gy++) {
    for (var gx = 0; gx < W; gx++) {
        var d = GRID.depthMap[gy][gx];
        if (d === 0) continue;
        var c      = GRID.colorMap[gy][gx];
        var zStart = Math.floor((MAX_D - d) / 2);
        for (var gz = zStart; gz < zStart + d; gz++) {
            // Exposed if any of the 6 face-neighbours is empty
            if (!isOcc(gx-1,gy,gz) || !isOcc(gx+1,gy,gz) ||
                !isOcc(gx,gy-1,gz) || !isOcc(gx,gy+1,gz) ||
                !isOcc(gx,gy,gz-1) || !isOcc(gx,gy,gz+1)) {
                VOXELS.push({ x: gx, y: gy, z: gz, r: c[0], g: c[1], b: c[2] });
            }
        }
    }
}

document.getElementById('dim').textContent    = SPR_W + '×' + SPR_H;
document.getElementById('vcount').textContent = VOXELS.length;

const cx = SPR_W / 2 - 0.5;
const cy = -SPR_H / 2 + 0.5;
const cz = MAX_D / 2;

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 500);
camera.position.set(cx + SPR_W * 0.7, cy + SPR_H * 0.9, cz + SPR_W * 1.6);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(cx, cy, cz);
controls.minDistance = 3;
controls.maxDistance = 200;

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfaf8ff, 0.7));

const sun = new THREE.DirectionalLight(0xfff9f0, 2.2);
sun.position.set(20, 30, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60;  sun.shadow.camera.right = 60;
sun.shadow.camera.top  =  60;  sun.shadow.camera.bottom = -60;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xd0e8ff, 0.8);
fill.position.set(-15, 10, -10);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffe0c0, 0.5);
rim.position.set(5, -10, -20);
scene.add(rim);

// Ground shadow catcher
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(SPR_W * 4, SPR_W * 4),
  new THREE.ShadowMaterial({ opacity: 0.15 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(cx, cy - SPR_H * 0.6, 0);
ground.receiveShadow = true;
scene.add(ground);

// ── Geometry helpers ──────────────────────────────────────────────────────────
function makeRoundedBox(size, blend) {
  var geo = new THREE.BoxGeometry(size, size, size, 2, 2, 2);
  var pos = geo.attributes.position;
  var r   = size / 2;
  for (var i = 0; i < pos.count; i++) {
    var x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    var len = Math.sqrt(x*x + y*y + z*z) || 1;
    pos.setXYZ(i,
      x*(1-blend) + (x/len*r)*blend,
      y*(1-blend) + (y/len*r)*blend,
      z*(1-blend) + (z/len*r)*blend
    );
  }
  geo.computeVertexNormals();
  return geo;
}

// ── Material cache ────────────────────────────────────────────────────────────
var matCache = {};
function getMat(r, g, b) {
  var k = r+','+g+','+b;
  if (!matCache[k]) matCache[k] = new THREE.MeshStandardMaterial({
    color: new THREE.Color(r/255, g/255, b/255),
    roughness: 0.55, metalness: 0.05
  });
  return matCache[k];
}

// ── Voxel rendering ───────────────────────────────────────────────────────────
var voxelGroup = new THREE.Group();
scene.add(voxelGroup);
var currentStyle = 'round';

function buildVoxels(style) {
  // Dispose old meshes
  while (voxelGroup.children.length) {
    var m = voxelGroup.children[0];
    voxelGroup.remove(m);
    if (m.geometry) m.geometry.dispose();
  }
  currentStyle = style;

  var geo;
  if      (style === 'cube')   geo = new THREE.BoxGeometry(0.92, 0.92, 0.92);
  else if (style === 'sphere') geo = new THREE.SphereGeometry(0.5, 14, 10);
  else                         geo = makeRoundedBox(0.92, 0.38);

  // Group by color
  var byColor = {};
  for (var i = 0; i < VOXELS.length; i++) {
    var v = VOXELS[i];
    var k = v.r+','+v.g+','+v.b;
    if (!byColor[k]) byColor[k] = { r:v.r, g:v.g, b:v.b, pos:[] };
    byColor[k].pos.push([v.x, -v.y, v.z || 0]);
  }

  var dummy = new THREE.Object3D();
  var keys  = Object.keys(byColor);
  for (var ki = 0; ki < keys.length; ki++) {
    var grp  = byColor[keys[ki]];
    var mesh = new THREE.InstancedMesh(geo, getMat(grp.r, grp.g, grp.b), grp.pos.length);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    for (var pi = 0; pi < grp.pos.length; pi++) {
      dummy.position.set(grp.pos[pi][0], grp.pos[pi][1], grp.pos[pi][2]);
      dummy.updateMatrix();
      mesh.setMatrixAt(pi, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    voxelGroup.add(mesh);
  }

  controls.target.set(cx, cy, cz);
  controls.update();
}

buildVoxels('round');

function setStyle(style) {
  buildVoxels(style);
  var labels = { cube:'■ Box', round:'▣ Round', sphere:'● Sphere' };
  document.querySelectorAll('.style-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim() === labels[style]);
  });
}

// ── 6-Face orthographic capture → ZIP download ────────────────────────────────
var FACE_DIRS = {
  front:  { pos:[cx, cy, 500],  up:[0,1,0] },
  back:   { pos:[cx, cy,-500],  up:[0,1,0] },
  right:  { pos:[ 500, cy, 0],  up:[0,1,0] },
  left:   { pos:[-500, cy, 0],  up:[0,1,0] },
  top:    { pos:[cx, 500,  0],  up:[0,0,-1] },
  bottom: { pos:[cx,-500,  0],  up:[0,0, 1] },
};

function showStatus(msg) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function captureAllFaces() {
  var btn = document.getElementById('capture-btn');
  btn.disabled = true;
  showStatus('Rendering faces…');

  var SIZE = 512;
  var off  = document.createElement('canvas');
  off.width = off.height = SIZE;
  var offR = new THREE.WebGLRenderer({ canvas: off, antialias: true, preserveDrawingBuffer: true });
  offR.setSize(SIZE, SIZE);
  offR.toneMapping = THREE.ACESFilmicToneMapping;
  offR.toneMappingExposure = 1.1;
  offR.setClearColor(0xf0ede8, 1);

  var dim = Math.max(SPR_W, SPR_H) * 0.65;
  var ortho = new THREE.OrthographicCamera(-dim, dim, dim, -dim, 0.1, 2000);

  var zip      = new JSZip();
  var names    = Object.keys(FACE_DIRS);
  var captured = {};

  for (var fi = 0; fi < names.length; fi++) {
    var name = names[fi];
    var cfg  = FACE_DIRS[name];
    ortho.position.set(cfg.pos[0], cfg.pos[1], cfg.pos[2]);
    ortho.up.set(cfg.up[0], cfg.up[1], cfg.up[2]);
    ortho.lookAt(cx, cy, 0);
    ortho.updateProjectionMatrix();
    offR.render(scene, ortho);

    var dataURL = off.toDataURL('image/png');
    captured[name] = dataURL;

    // Strip header for zip
    var b64 = dataURL.split(',')[1];
    zip.file(name + '.png', b64, { base64: true });
  }

  offR.dispose();

  // Show thumbnails
  var strip = document.getElementById('thumb-strip');
  // Clear old thumbs (keep label)
  var label = document.getElementById('thumb-label');
  strip.innerHTML = '';
  strip.appendChild(label);
  names.forEach(function(name) {
    var div  = document.createElement('div');
    div.className = 'thumb';
    var img  = document.createElement('img');
    img.src  = captured[name];
    var span = document.createElement('span');
    span.textContent = name.toUpperCase();
    div.appendChild(img);
    div.appendChild(span);
    strip.appendChild(div);
  });
  strip.classList.add('show');

  // Trigger ZIP download
  showStatus('Packaging ZIP…');
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var a    = document.createElement('a');
    a.href   = URL.createObjectURL(blob);
    a.download = 'pixelcraft_faces.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    showStatus('');
    btn.disabled = false;
    btn.textContent = '✓ Downloaded — upload faces below';
  });
}

// ── Resize ────────────────────────────────────────────────────────────────────
function onResize() {
  var wrap = canvas.parentElement;
  var w = wrap.clientWidth, h = 420;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Render loop ───────────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
