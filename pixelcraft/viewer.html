<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: transparent; overflow: hidden; }

  #canvas-wrap {
    width: 100%; height: 420px; position: relative;
    background: radial-gradient(ellipse at 50% 30%, #e8e3f5 0%, #ddd8ec 40%, #cec9e0 100%);
    border-radius: 12px; overflow: hidden;
  }
  #c { display: block; width: 100%; height: 100%; cursor: grab; }
  #c:active { cursor: grabbing; }

  #info-bar {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.82); backdrop-filter: blur(8px);
    border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #444;
    pointer-events: none;
  }

  #style-btns {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 6px;
  }
  .style-btn {
    background: rgba(255,255,255,0.85); border: 1.5px solid #b9b2d4;
    border-radius: 8px; padding: 5px 11px; font-size: 11px; color: #5a3fa0;
    cursor: pointer; font-weight: 700; transition: all 0.15s;
  }
  .style-btn:hover, .style-btn.active {
    background: #7c3aed; color: white; border-color: #7c3aed;
  }

  #bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,255,255,0.78); backdrop-filter: blur(8px);
    border-top: 1px solid rgba(180,170,210,0.3);
    font-size: 11px; color: #666;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="info-bar">Sprite: <span id="dim">?</span> · <span id="vcount">?</span> voxels</div>
  <div id="style-btns">
    <button class="style-btn active" onclick="setAngle(0)" id="btn-iso">⬡ Isometric</button>
    <button class="style-btn" onclick="setAngle(1)" id="btn-front">■ Front</button>
    <button class="style-btn" onclick="setAngle(2)" id="btn-side">◧ Side</button>
  </div>
  <div id="bottom-bar">
    <span>🖱 drag to rotate · scroll to zoom</span>
  </div>
</div>

<script>
// ── Injected data ──────────────────────────────────────────────────────────
const GRID  = __GRID_DATA__;
const SPR_W = __SPRITE_W__;
const SPR_H = __SPRITE_H__;
const H = GRID.H, W = GRID.W, MAX_D = GRID.MAX_D;

// ── Build surface voxel list ───────────────────────────────────────────────
var occSet = {};
function key(x,y,z){ return x+','+y+','+z; }

for (var gy=0; gy<H; gy++) {
  for (var gx=0; gx<W; gx++) {
    var d = GRID.depthMap[gy][gx];
    if (!d) continue;
    var zs = Math.floor((MAX_D - d) / 2);
    for (var gz=zs; gz<zs+d; gz++) occSet[key(gx,gy,gz)] = 1;
  }
}

function isOcc(x,y,z) {
  if (x<0||x>=W||y<0||y>=H||z<0||z>=MAX_D) return false;
  return !!occSet[key(x,y,z)];
}

var VOXELS = [];
for (var gy=0; gy<H; gy++) {
  for (var gx=0; gx<W; gx++) {
    var d = GRID.depthMap[gy][gx];
    if (!d) continue;
    var c = GRID.colorMap[gy][gx];
    if (!c) continue;
    var zs = Math.floor((MAX_D - d) / 2);
    for (var gz=zs; gz<zs+d; gz++) {
      // Only surface voxels
      if (!isOcc(gx-1,gy,gz)||!isOcc(gx+1,gy,gz)||
          !isOcc(gx,gy-1,gz)||!isOcc(gx,gy+1,gz)||
          !isOcc(gx,gy,gz-1)||!isOcc(gx,gy,gz+1)) {
        VOXELS.push({x:gx, y:gy, z:gz, r:c[0], g:c[1], b:c[2]});
      }
    }
  }
}

document.getElementById('dim').textContent    = SPR_W+'×'+SPR_H;
document.getElementById('vcount').textContent = VOXELS.length;

// ── Canvas + context ───────────────────────────────────────────────────────
var wrap   = document.getElementById('canvas-wrap');
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');

// ── Camera state ───────────────────────────────────────────────────────────
var rotX   = 0.55;   // radians, pitch
var rotY   = 0.75;   // radians, yaw
var zoom   = 1.0;
var angleMode = 0;   // 0=iso, 1=front, 2=side

var cx = W / 2, cy_v = H / 2, cz = MAX_D / 2;

// ── Projection ────────────────────────────────────────────────────────────
function project(vx, vy, vz) {
  // Translate to center
  var x = vx - cx;
  var y = vy - cy_v;
  var z = vz - cz;

  // Rotate Y (yaw)
  var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  var x1 =  x * cosY + z * sinY;
  var z1 = -x * sinY + z * cosY;
  var y1 =  y;

  // Rotate X (pitch)
  var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  var y2 =  y1 * cosX - z1 * sinX;
  var z2 =  y1 * sinX + z1 * cosX;
  var x2 =  x1;

  return {
    sx: x2,
    sy: y2,
    depth: z2
  };
}

// ── Face colors ────────────────────────────────────────────────────────────
function faceColor(r, g, b, shade) {
  return 'rgb('+Math.round(r*shade)+','+Math.round(g*shade)+','+Math.round(b*shade)+')';
}

// ── Sort voxels back-to-front (painter's algorithm) ───────────────────────
function sortedVoxels() {
  var list = VOXELS.map(function(v) {
    var p = project(v.x + 0.5, v.y + 0.5, v.z + 0.5);
    return { v: v, depth: p.depth };
  });
  list.sort(function(a, b) { return b.depth - a.depth; });
  return list;
}

// ── Draw one voxel as 3 visible faces ────────────────────────────────────
function drawVoxel(v, scale, offX, offY) {
  var r = v.r, g = v.g, b = v.b;
  var s = scale;

  // Project the 8 corners
  function P(dx, dy, dz) {
    var p = project(v.x + dx, v.y + dy, v.z + dz);
    return { x: offX + p.sx * s, y: offY + p.sy * s };
  }

  var p000 = P(0,0,0), p100 = P(1,0,0), p010 = P(0,1,0), p110 = P(1,1,0);
  var p001 = P(0,0,1), p101 = P(1,0,1), p011 = P(0,1,1), p111 = P(1,1,1);

  // Determine which faces to draw based on camera direction
  var cp = project(0.5, 0.5, 0.5);

  // Top face (y=0): visible if camera is above center
  if (Math.sin(rotX) > -0.1) {
    ctx.beginPath();
    ctx.moveTo(p000.x, p000.y);
    ctx.lineTo(p100.x, p100.y);
    ctx.lineTo(p101.x, p101.y);
    ctx.lineTo(p001.x, p001.y);
    ctx.closePath();
    ctx.fillStyle = faceColor(r, g, b, 1.0);
    ctx.fill();
  }

  // Front face (y+1): visible based on yaw
  var showFront = Math.cos(rotX) * Math.sin(rotY + Math.PI/2) > 0;
  if (true) { // always draw, shade determines visibility feel
    ctx.beginPath();
    ctx.moveTo(p010.x, p010.y);
    ctx.lineTo(p110.x, p110.y);
    ctx.lineTo(p111.x, p111.y);
    ctx.lineTo(p011.x, p011.y);
    ctx.closePath();
    ctx.fillStyle = faceColor(r, g, b, 0.65);
    ctx.fill();
  }

  // Right face (x+1)
  if (true) {
    ctx.beginPath();
    ctx.moveTo(p100.x, p100.y);
    ctx.lineTo(p110.x, p110.y);
    ctx.lineTo(p111.x, p111.y);
    ctx.lineTo(p101.x, p101.y);
    ctx.closePath();
    ctx.fillStyle = faceColor(r, g, b, 0.82);
    ctx.fill();
  }

  // Left face (x=0) — draw opposite side when rotated
  ctx.beginPath();
  ctx.moveTo(p000.x, p000.y);
  ctx.lineTo(p010.x, p010.y);
  ctx.lineTo(p011.x, p011.y);
  ctx.lineTo(p001.x, p001.y);
  ctx.closePath();
  ctx.fillStyle = faceColor(r, g, b, 0.55);
  ctx.fill();

  // Bottom face
  ctx.beginPath();
  ctx.moveTo(p001.x, p001.y);
  ctx.lineTo(p101.x, p101.y);
  ctx.lineTo(p111.x, p111.y);
  ctx.lineTo(p011.x, p011.y);
  ctx.closePath();
  ctx.fillStyle = faceColor(r, g, b, 0.42);
  ctx.fill();
}

// ── Compute scale + offset to fit model in canvas ─────────────────────────
function computeLayout() {
  var cw = canvas.width, ch = canvas.height;
  var corners = [
    [0,0,0],[W,0,0],[0,H,0],[0,0,MAX_D],
    [W,H,0],[W,0,MAX_D],[0,H,MAX_D],[W,H,MAX_D]
  ];
  var minX = Infinity, maxX = -Infinity;
  var minY = Infinity, maxY = -Infinity;
  corners.forEach(function(c) {
    var p = project(c[0], c[1], c[2]);
    if (p.sx < minX) minX = p.sx;
    if (p.sx > maxX) maxX = p.sx;
    if (p.sy < minY) minY = p.sy;
    if (p.sy > maxY) maxY = p.sy;
  });
  var extX = maxX - minX || 1;
  var extY = maxY - minY || 1;
  var scale = Math.min(cw / extX, ch / extY) * 0.82 * zoom;
  var offX  = cw / 2 - ((minX + maxX) / 2) * scale;
  var offY  = ch / 2 - ((minY + maxY) / 2) * scale;
  return { scale: scale, offX: offX, offY: offY };
}

// ── Main render ───────────────────────────────────────────────────────────
function render() {
  var cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  var layout = computeLayout();
  var sorted = sortedVoxels();

  for (var i = 0; i < sorted.length; i++) {
    drawVoxel(sorted[i].v, layout.scale, layout.offX, layout.offY);
  }
}

// ── Resize ────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = wrap.clientWidth  * window.devicePixelRatio;
  canvas.height = wrap.clientHeight * window.devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  render();
}

// ── Mouse / touch drag to rotate ──────────────────────────────────────────
var dragging = false, lastX = 0, lastY = 0;

canvas.addEventListener('mousedown', function(e) {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  e.preventDefault();
});
window.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx = e.clientX - lastX, dy = e.clientY - lastY;
  rotY += dx * 0.012;
  rotX += dy * 0.012;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastX = e.clientX; lastY = e.clientY;
  render();
});
window.addEventListener('mouseup', function() { dragging = false; });

canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (!dragging || e.touches.length !== 1) return;
  var dx = e.touches[0].clientX - lastX;
  var dy = e.touches[0].clientY - lastY;
  rotY += dx * 0.012;
  rotX += dy * 0.012;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  render();
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', function() { dragging = false; });

canvas.addEventListener('wheel', function(e) {
  zoom *= e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.3, Math.min(4.0, zoom));
  render();
  e.preventDefault();
}, { passive: false });

// ── Angle presets ─────────────────────────────────────────────────────────
function setAngle(mode) {
  angleMode = mode;
  if (mode === 0) { rotX = 0.55; rotY = 0.75; zoom = 1.0; }  // isometric
  if (mode === 1) { rotX = 0.0;  rotY = 0.0;  zoom = 1.2; }  // front
  if (mode === 2) { rotX = 0.0;  rotY = Math.PI/2; zoom = 1.2; } // side

  ['btn-iso','btn-front','btn-side'].forEach(function(id, i) {
    document.getElementById(id).classList.toggle('active', i === mode);
  });
  render();
}

// ── Animate (rotation auto-spin on load, then stops) ──────────────────────
var spinning = true;
var spinFrame = 0;
function autoSpin() {
  if (!spinning) return;
  spinFrame++;
  if (spinFrame < 80) {
    rotY += 0.015;
    render();
    requestAnimationFrame(autoSpin);
  } else {
    spinning = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(autoSpin);

// Stop auto-spin on first interaction
canvas.addEventListener('mousedown', function() { spinning = false; }, { once: true });
canvas.addEventListener('touchstart', function() { spinning = false; }, { once: true });
</script>
</body>
</html>
