<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PixelCraft — Region Painter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0d0d14;
  background-image: radial-gradient(ellipse at 20% 10%, #1a0a2e 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 90%, #0a1a2e 0%, transparent 50%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}

:root {
  --head:  #f97316;
  --torso: #3b82f6;
  --limb:  #22c55e;
  --tuft:  #a855f7;
}

h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.9rem; color: #fff;
  text-shadow: 0 0 20px #a78bfa88;
  margin-bottom: 4px; letter-spacing: 0.05em;
}
.subtitle { font-size: 0.8rem; color: #6b6b8a; margin-bottom: 20px; }

#app {
  width: 100%; max-width: 700px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ── Error banner ── */
#error-banner {
  display: none; background: #3d1010; border: 1px solid #7c1d1d;
  border-radius: 8px; padding: 8px 12px; color: #fca5a5; font-size: 11px;
}

/* ── Toolbar ── */
#toolbar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  background: #16161f; border: 1px solid #2a2a3d;
  border-radius: 12px; padding: 10px 12px;
}
.tool-label { font-size: 9px; font-weight: 700; color: #6b6b8a; letter-spacing: 0.1em; text-transform: uppercase; }
.brush-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 7px; border: 2px solid transparent;
  cursor: pointer; font-size: 11px; font-weight: 700;
  background: #1e1e2e; color: #aaa; transition: all 0.12s;
  font-family: 'DM Sans', sans-serif;
}
.brush-btn:hover { filter: brightness(1.2); }
.brush-btn.active { color: #fff; }
.brush-btn[data-region="head"]  { border-color: var(--head);  }
.brush-btn[data-region="torso"] { border-color: var(--torso); }
.brush-btn[data-region="limb"]  { border-color: var(--limb);  }
.brush-btn[data-region="tuft"]  { border-color: var(--tuft);  }
.brush-btn[data-region="erase"] { border-color: #555;         }
.brush-btn.active[data-region="head"]  { background: var(--head);  }
.brush-btn.active[data-region="torso"] { background: var(--torso); }
.brush-btn.active[data-region="limb"]  { background: var(--limb);  }
.brush-btn.active[data-region="tuft"]  { background: var(--tuft);  }
.brush-btn.active[data-region="erase"] { background: #555;         }
.dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.dot-head  { background: var(--head);  }
.dot-torso { background: var(--torso); }
.dot-limb  { background: var(--limb);  }
.dot-tuft  { background: var(--tuft);  }
.dot-erase { background: #666; }
.sep { width: 1px; height: 24px; background: #2a2a3d; flex-shrink: 0; }
#size-btns { display: flex; gap: 3px; }
.size-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid #3d3d5c;
  background: #1e1e2e; color: #888; font-size: 11px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; transition: all 0.12s;
}
.size-btn.active, .size-btn:hover { border-color: #a78bfa; color: #a78bfa; background: #2a1a4e; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #3d3d5c;
  background: #1e1e2e; color: #888; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.icon-btn:hover { border-color: #a78bfa; color: #a78bfa; }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Canvas ── */
#canvas-wrap {
  display: flex; justify-content: center; align-items: center;
  border-radius: 12px; border: 1px solid #2a2a3d; padding: 16px;
  overflow: hidden;
  background-color: #13131e;
  background-image:
    linear-gradient(45deg, #1a1a28 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a28 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a28 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a28 75%);
  background-size: 12px 12px;
  background-position: 0 0, 0 6px, 6px -6px, -6px 0;
}
#canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: crosshair;
  display: block;
  max-width: 100%;
  max-height: 640px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  pointer-events: auto;
  filter: drop-shadow(0 0 8px rgba(167,139,250,0.2));
}

/* ── Legend ── */
#legend {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  padding: 8px 12px; background: #16161f; border-radius: 10px;
  border: 1px solid #2a2a3d;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; color: #8b8ba0; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-swatch.auto { opacity: 0.35; }

/* ── Status + submit ── */
#status-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: #5a5a7a;
}
#submit-btn {
  padding: 10px 22px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: #fff; border: none; border-radius: 9px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
  cursor: pointer; box-shadow: 0 4px 16px #7c3aed55;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, transform 0.1s;
}
#submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
#submit-btn.success { background: linear-gradient(135deg, #059669, #34d399); cursor: default; }
#auto-btn {
  padding: 8px 13px; background: #1e1e2e; border: 1.5px solid #3d3d5c;
  color: #a78bfa; border-radius: 8px; font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
#auto-btn:hover { border-color: #a78bfa; background: #2a1a4e; }
#shortcuts { font-size: 9px; color: #3d3d5c; text-align: center; letter-spacing: 0.04em; }

/* ── Flash ── */
#flash {
  position: fixed; inset: 0; pointer-events: none;
  background: rgba(124,58,237,0.15); opacity: 0;
  transition: opacity 0.35s; z-index: 999;
}
#flash.show { opacity: 1; }
</style>
</head>
<body>

<h1>REGION PAINTER</h1>
<p class="subtitle">paint zones → click Apply → close this tab</p>

<div id="app">
  <div id="error-banner"></div>

  <div id="toolbar">
    <span class="tool-label">Paint</span>
    <button class="brush-btn active" data-region="head"  onclick="setRegion('head')"><span class="dot dot-head"></span>Head</button>
    <button class="brush-btn"        data-region="torso" onclick="setRegion('torso')"><span class="dot dot-torso"></span>Torso</button>
    <button class="brush-btn"        data-region="limb"  onclick="setRegion('limb')"><span class="dot dot-limb"></span>Limbs</button>
    <button class="brush-btn"        data-region="tuft"  onclick="setRegion('tuft')"><span class="dot dot-tuft"></span>Tuft</button>
    <button class="brush-btn"        data-region="erase" onclick="setRegion('erase')"><span class="dot dot-erase"></span>Erase</button>
    <div class="sep"></div>
    <span class="tool-label">Size</span>
    <div id="size-btns">
      <button class="size-btn"        data-sz="1" onclick="setSize(1)">1</button>
      <button class="size-btn active" data-sz="2" onclick="setSize(2)">2</button>
      <button class="size-btn"        data-sz="4" onclick="setSize(4)">4</button>
    </div>
    <div class="sep"></div>
    <button class="icon-btn" id="undo-btn"  onclick="undo()"     title="Undo (Ctrl+Z)" disabled>↩</button>
    <button class="icon-btn" id="clear-btn" onclick="clearAll()" title="Clear all">✕</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="legend">
    <span class="legend-item"><span class="legend-swatch" style="background:var(--head)"></span>HEAD — deepest</span>
    <span class="legend-item"><span class="legend-swatch" style="background:var(--torso)"></span>TORSO</span>
    <span class="legend-item"><span class="legend-swatch" style="background:var(--limb)"></span>LIMBS</span>
    <span class="legend-item"><span class="legend-swatch" style="background:var(--tuft)"></span>TUFT — shallowest</span>
    <span class="legend-item" style="margin-left:auto;">
      <span class="legend-swatch auto" style="background:var(--head)"></span>
      <span style="color:#3d3d5c;">faint = auto · bright = your paint</span>
    </span>
  </div>

  <div id="status-bar">
    <span id="cov-text">painted: 0 px</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="auto-btn" onclick="applyAutoDetect()">⟳ Reset to auto</button>
      <button id="submit-btn" onclick="submitRegions()">Apply regions →</button>
    </div>
  </div>

  <div id="shortcuts">H=head · T=torso · L=limbs · U=tuft · E=erase · 1/2/3=brush size · Ctrl+Z=undo</div>
</div>

<div id="flash"></div>

<script>
// ── showError defined first so it's available to all code below ───────────────
function showError(msg) {
  var el = document.getElementById('error-banner');
  if (el) { el.textContent = '⚠ ' + msg; el.style.display = 'block'; }
  console.error('[RegionPainter]', msg);
}

// ── Injected by Python (placeholders replaced by write_painter_static) ────────
var SPRITE_SRC = "__SPRITE_B64__";
var SPRITE_W   = __SPRITE_W__;
var SPRITE_H   = __SPRITE_H__;
var RETURN_URL = "__RETURN_URL__";

// AUTO_REGIONS: raw JSON array injected by Python. Parsed defensively.
var AUTO_REGIONS = null;
try {
  AUTO_REGIONS = __AUTO_REGIONS__;
} catch (e) {
  showError('Auto-region data could not be parsed: ' + e.message + '. Manual painting still works.');
}

// ── Region constants ──────────────────────────────────────────────────────────
var CODE = { head: 0, torso: 1, limb: 2, tuft: 3, erase: -1 };
var REGION_RGBA = {
  // User-painted strokes: fully opaque so edits are clearly visible
  0: 'rgba(249,115,22,0.75)',
  1: 'rgba(59,130,246,0.75)',
  2: 'rgba(34,197,94,0.75)',
  3: 'rgba(168,85,247,0.75)',
};
// Auto-detected suggestions: faint so the user can see they haven't painted here yet
var AUTO_RGBA = {
  0: 'rgba(249,115,22,0.22)',
  1: 'rgba(59,130,246,0.22)',
  2: 'rgba(34,197,94,0.22)',
  3: 'rgba(168,85,247,0.22)',
};

// ── State ─────────────────────────────────────────────────────────────────────
// regionMap:  the user's explicit strokes only.  Starts empty (-1 everywhere).
// autoMap:    the auto-detected suggestion layer, shown faintly underneath.
//             Never modified by brush strokes; only replaced by "Reset to auto".
var regionMap    = new Array(SPRITE_W * SPRITE_H).fill(-1);  // user edits
var autoMap      = new Array(SPRITE_W * SPRITE_H).fill(-1);  // auto suggestions
var undoHistory  = [];  // renamed from 'history' — 'var history' shadows window.history, causing history.push() to throw
var activeRegion = 'head';
var brushSize    = 2;
var painting     = false;
var spriteReady  = false;

// ── Canvas setup ──────────────────────────────────────────────────────────────
var cv  = document.getElementById('canvas');
if (!cv) { showError('Canvas element not found — page may have failed to load.'); }
var ctx = cv ? cv.getContext('2d', { willReadFrequently: false }) : null;
if (ctx) ctx.imageSmoothingEnabled = false;

// Use as much horizontal space as available (up to 640px) so each sprite
// pixel maps to enough screen pixels for the brush to feel natural.
// For a 64×64 sprite this gives CANVAS_SCALE=9 at 600px wide vs the old
// CANVAS_SCALE=6 at 440px — each grid cell grows from 6→9px, making
// brushSize=1 paint one clearly visible sprite-pixel cell.
var MAX_DISPLAY  = Math.min(640, window.innerWidth - 32);
var CANVAS_SCALE = Math.max(8, Math.min(24, Math.floor(MAX_DISPLAY / Math.max(SPRITE_W, SPRITE_H, 1))));
var CW = SPRITE_W * CANVAS_SCALE;
var CH = SPRITE_H * CANVAS_SCALE;
if (cv) {
  cv.width  = CW;
  cv.height = CH;
  cv.style.width  = CW + 'px';
  cv.style.height = CH + 'px';
}

// ── Load sprite ───────────────────────────────────────────────────────────────
var spriteImg = new Image();
spriteImg.onload = function() {
  spriteReady = true;
  // Populate autoMap from the injected auto-regions — does NOT touch regionMap.
  // This means the canvas starts showing faint suggestions that the user
  // can paint over (at which point the bright user-stroke replaces the faint auto).
  if (AUTO_REGIONS) {
    try {
      for (var y = 0; y < SPRITE_H; y++) {
        for (var x = 0; x < SPRITE_W; x++) {
          var v = AUTO_REGIONS[y] && AUTO_REGIONS[y][x];
          if (v !== null && v !== undefined && v >= 0) {
            autoMap[y * SPRITE_W + x] = v;
          }
        }
      }
    } catch (e) {
      showError('Could not apply auto-regions: ' + e.message);
    }
  }
  redraw();
  updateStatus();
};
spriteImg.onerror = function() {
  showError('Sprite image failed to load. Try re-uploading your sprite.');
};
spriteImg.src = SPRITE_SRC;

// ── Render ────────────────────────────────────────────────────────────────────
function redraw() {
  if (!ctx) return;
  ctx.clearRect(0, 0, CW, CH);

  // 1. Draw sprite
  if (spriteReady) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spriteImg, 0, 0, CW, CH);
  }

  var S = CANVAS_SCALE;

  // 2. Auto-region layer (faint) — only shown where the user hasn't painted
  for (var y = 0; y < SPRITE_H; y++) {
    for (var x = 0; x < SPRITE_W; x++) {
      var idx = y * SPRITE_W + x;
      if (regionMap[idx] >= 0) continue;          // user stroke will cover this
      var av = autoMap[idx];
      if (av < 0) continue;
      ctx.fillStyle = AUTO_RGBA[av] || 'rgba(255,255,255,0.15)';
      ctx.fillRect(x * S, y * S, S, S);
    }
  }

  // 3. User-painted layer (bright) — drawn on top of auto suggestions
  for (var y = 0; y < SPRITE_H; y++) {
    for (var x = 0; x < SPRITE_W; x++) {
      var v = regionMap[y * SPRITE_W + x];
      if (v < 0) continue;
      ctx.fillStyle = REGION_RGBA[v] || 'rgba(255,255,255,0.6)';
      ctx.fillRect(x * S, y * S, S, S);
    }
  }

  // 4. Subtle pixel grid
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx <= SPRITE_W; gx++) {
    ctx.beginPath(); ctx.moveTo(gx * S, 0); ctx.lineTo(gx * S, CH); ctx.stroke();
  }
  for (var gy = 0; gy <= SPRITE_H; gy++) {
    ctx.beginPath(); ctx.moveTo(0, gy * S); ctx.lineTo(CW, gy * S); ctx.stroke();
  }
}

// ── Coordinate helper ─────────────────────────────────────────────────────────
function pixelAt(clientX, clientY) {
  var r = cv.getBoundingClientRect();
  if (r.width === 0 || r.height === 0) return [0, 0];
  // r.width is the CSS-rendered size; cv.width is the internal canvas resolution.
  // Dividing by r.width (not cv.width) gives us CSS-pixel offsets, then we
  // divide by CANVAS_SCALE to convert to sprite pixels. This is correct whether
  // or not CSS shrinks the canvas below its inline style size.
  var sx = Math.floor((clientX - r.left) / r.width  * SPRITE_W);
  var sy = Math.floor((clientY - r.top)  / r.height * SPRITE_H);
  return [
    Math.max(0, Math.min(SPRITE_W - 1, sx)),
    Math.max(0, Math.min(SPRITE_H - 1, sy)),
  ];
}

// ── Paint ─────────────────────────────────────────────────────────────────────
function paint(px, py) {
  var code   = activeRegion === 'erase' ? -1 : CODE[activeRegion];
  // floor(brushSize/2) centers the brush on the cursor for both odd and even sizes:
  //   size 1 → offset 0 → paints px..px       (cursor is the only cell)
  //   size 2 → offset 1 → paints px-1..px     (cursor is right cell, straddles boundary)
  //   size 4 → offset 2 → paints px-2..px+1   (cursor sits between the two middle cells)
  var start  = px - Math.floor(brushSize / 2);
  var startY = py - Math.floor(brushSize / 2);
  for (var dy = 0; dy < brushSize; dy++) {
    for (var dx = 0; dx < brushSize; dx++) {
      var nx = start  + dx;
      var ny = startY + dy;
      if (nx >= 0 && nx < SPRITE_W && ny >= 0 && ny < SPRITE_H) {
        regionMap[ny * SPRITE_W + nx] = code;
      }
    }
  }
  redraw();
  updateStatus();
}

function snapshot() {
  undoHistory.push(regionMap.slice());
  if (undoHistory.length > 50) undoHistory.shift();
  document.getElementById('undo-btn').disabled = false;
}

// ── Pointer events ────────────────────────────────────────────────────────────
if (cv) {
  cv.addEventListener('pointerdown', function(e) {
    if (e.button !== undefined && e.button !== 0 && e.pointerType === 'mouse') return;
    e.preventDefault();
    try { cv.setPointerCapture(e.pointerId); } catch (_) {}
    snapshot();
    painting = true;
    var p = pixelAt(e.clientX, e.clientY);
    paint(p[0], p[1]);
  });

  cv.addEventListener('pointermove', function(e) {
    if (!painting) return;
    e.preventDefault();
    var p = pixelAt(e.clientX, e.clientY);
    paint(p[0], p[1]);
  });

  cv.addEventListener('pointerup', function(e) {
    painting = false;
    try { cv.releasePointerCapture(e.pointerId); } catch (_) {}
  });

  cv.addEventListener('pointercancel', function() {
    painting = false;
  });

  cv.addEventListener('contextmenu', function(e) { e.preventDefault(); });
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setRegion(r) {
  activeRegion = r;
  document.querySelectorAll('.brush-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.region === r);
  });
}

function setSize(s) {
  brushSize = s;
  document.querySelectorAll('.size-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.sz) === s);
  });
}

function undo() {
  if (!undoHistory.length) return;
  regionMap = Array.from(undoHistory.pop());
  redraw();
  updateStatus();
  document.getElementById('undo-btn').disabled = undoHistory.length === 0;
}

function clearAll() {
  snapshot();
  regionMap = new Array(SPRITE_W * SPRITE_H).fill(-1);
  redraw();
  updateStatus();
}

// "Reset to auto": copy autoMap into regionMap so the user can keep editing
// from the auto-detected baseline rather than from scratch.
function applyAutoDetect() {
  if (!AUTO_REGIONS) return;
  snapshot();
  regionMap = autoMap.slice();   // copy auto suggestions into user layer
  redraw();
  updateStatus();
}

// ── Status — counts only user-painted pixels ──────────────────────────────────
function updateStatus() {
  var painted = 0;
  for (var i = 0; i < regionMap.length; i++) if (regionMap[i] >= 0) painted++;
  document.getElementById('cov-text').textContent =
    'painted: ' + painted + ' / ' + regionMap.length + ' px';
}

// ── Submit ────────────────────────────────────────────────────────────────────
// For submission we merge: user strokes take priority; unpainted pixels fall
// back to the auto-detected value (if any) so the back-end always gets a
// fully-labelled region map even if the user only corrected part of the sprite.
function submitRegions() {
  try {
    // Build the merged map: user override > auto > -1 (unassigned)
    var merged = new Array(SPRITE_W * SPRITE_H);
    for (var i = 0; i < merged.length; i++) {
      merged[i] = regionMap[i] >= 0 ? regionMap[i] : autoMap[i];
    }

    var packed = new Uint8Array(4 + merged.length);
    packed[0] = (SPRITE_W >> 8) & 0xff;
    packed[1] =  SPRITE_W       & 0xff;
    packed[2] = (SPRITE_H >> 8) & 0xff;
    packed[3] =  SPRITE_H       & 0xff;
    for (var i = 0; i < merged.length; i++) {
      packed[i + 4] = (merged[i] + 1) & 0xff;
    }

    var binary = '';
    var chunk  = 8192;
    for (var j = 0; j < packed.length; j += chunk) {
      binary += String.fromCharCode.apply(null, packed.subarray(j, j + chunk));
    }
    var b64 = btoa(binary);

    var flash = document.getElementById('flash');
    flash.classList.add('show');
    setTimeout(function() { flash.classList.remove('show'); }, 400);

    var btn = document.getElementById('submit-btn');
    btn.textContent = '✓ Applied! Returning to PixelCraft…';
    btn.classList.add('success');
    btn.disabled = true;

    var targetUrl = RETURN_URL + '?regions=' + encodeURIComponent(b64);

    setTimeout(function() {
      var navigatedOpener = false;
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.location.href = targetUrl;
          navigatedOpener = true;
          setTimeout(function() { window.close(); }, 600);
        }
      } catch (e) { /* cross-origin or popup blocker */ }

      if (!navigatedOpener) {
        window.location.href = targetUrl;
      }
    }, 350);

  } catch (e) {
    showError('Failed to encode regions: ' + e.message);
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.target && e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
  var map = { h: 'head', t: 'torso', l: 'limb', u: 'tuft', e: 'erase' };
  if (map[e.key]) setRegion(map[e.key]);
  if (e.key === '1') setSize(1);
  if (e.key === '2') setSize(2);
  if (e.key === '3') setSize(4);
});
</script>
</body>
</html>
